  mandate_0_24:
    name: "Allumfassendes Wissen - Best Practices 2026"
    effective: "2026-01-28"
    principle: "User expects AI to be omniscient"
    research_phases:
      phase_1_planning:
        - "Web Search: [Technology] Best Practices 2026"
        - "GitHub Grep: Find production-ready implementations"
        - "Context7: Official documentation latest version"
        - "Stack Overflow: Current solutions and patterns"
      phase_2_during_planning:
        - "For each architecture decision: Research alternatives"
        - "Compare patterns: Which is 2026 State-of-the-Art?"
        - "Check deprecations: Is this method still current?"
        - "Security Check: Any new CVEs for this library?"
      phase_3_during_coding:
        - "At EVERY error hint → Start research immediately"
        - "Copy error message → Search Google/Bing/DDG"
        - "Never guess when uncertain, ALWAYS look up"
        - "Analyze stacktraces → Find root cause"
      phase_4_at_problems:
        - "Error occurred → Immediate: websearch_web_search_exa()"
        - "[Error Message] solution 2026"
        - "Compare multiple sources"
        - "Implement verified solution (not workaround!)"
