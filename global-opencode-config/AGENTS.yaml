  mandate_0_33:
    name: "Docker Container as MCP - Wrapper Protocol"
    effective: "2026-01-29"
    principle: "Docker containers are HTTP APIs, NOT native MCP Servers. A stdio-wrapper MUST be created."
    architecture:
      step_1: "Docker Container (HTTP API) -> Express/FastAPI on Port 8xxx"
      step_2: "MCP Wrapper (stdio) -> Node.js/Python script in /mcp-wrappers/"
      step_3: "OpenCode Config -> type: local, command: node wrapper.js"
    rules:
      forbidden:
        - "Docker container as type: remote in opencode.json"
        - "Direct HTTP URLs in opencode.json MCP config"
        - "Hardcoded IPs (172.20.0.x)"
        - "Everything in one docker-compose.yml"
      mandatory:
        - "Wrapper as type: local (stdio)"
        - "Wrapper script in between"
        - "Use service names"
        - "One container = one docker-compose.yml"
    required_docs:
      - "CONTAINER-REGISTRY.md"
      - "ARCHITECTURE-MODULAR.md"
      - "MCP WRAPPERS README"

  container_naming_convention:
    format: "{category}-{number}-{name}"
    categories:
      agent: "AI Workers, Orchestrators, Automation (e.g., agent-01-n8n-manager)"
      room: "Infrastructure, Databases, Storage (e.g., room-01-dashboard)"
      solver: "Money-Making Workers (e.g., solver-1.1-captcha-worker)"
      builder: "Content Creation Workers"
    forbidden_prefixes: ["sin-zimmer-"]

