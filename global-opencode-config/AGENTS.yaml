      - "Das habe ich mal irgendwo gesehen..."
      - "Probieren wir es einfach aus..."
      - "Das ist vermutlich deprecated..."
    preferred:
      - "Lass mich die aktuelle Dokumentation prüfen..."
      - "Die offiziellen Best Practices 2026 sagen..."
      - "Laut der neuesten Version sollten wir..."
      - "Ich recherchiere das jetzt genau..."

  mandate_0_25:
    name: "Selbstkritik & Crashtests - CEO-Mindset"
    effective: "2026-01-28"
    principle: "Be your WORST EXAMINER and CONTROLLER"
    validation_workflow:
      step_1_weakness_analysis:
        - "How could this code crash?"
        - "What edge cases were forgotten?"
        - "Is error handling complete?"
        - "Are there race conditions?"
        - "Are all input validations present?"
      step_2_crash_tests:
        - "Test invalid inputs"
        - "Test boundary values (0, null, undefined, [], {})"
        - "Test concurrent requests"
        - "Simulate network failures"
        - "Simulate database connection loss"
      step_3_browser_verification:
        - "Open UI in browser and visually verify"
        - "Mobile/Responsive Testing"
        - "Cross-Browser Testing"
      step_4_integration_tests:
        - "Run end-to-end tests"
        - "Test API integration"
        - "Verify database operations"
        - "Mock and test external services"
      step_5_performance_tests:
        - "Load Testing (100+ concurrent requests)"
        - "Memory Leak Detection"
        - "Response Time Monitoring (< 200ms P95)"
      step_6_security_audit:
        - "OWASP Top 10 Check"
        - "SQL Injection Tests"
        - "XSS Vulnerability Scan"
        - "Secret-Leakage Check"

  mandate_0_26:
    name: "Phasenplanung & Fehlervermeidung"
    effective: "2026-01-28"
    principle: "Plan sequentially, anticipate errors, avoid proactively"
    planning_workflow:
      step_1_milestones:
        - "Define clear milestones (max 5 per phase)"
        - "Define expectations (what is desired result?)"
        - "Define acceptance criteria (when is it 'done'?)"
        - "Define timeframe (realistic estimate)"
      step_2_error_anticipation:
        - "What could go wrong with database integration?"
        - "What CORS problems do we expect?"
        - "Where could race conditions occur?"
        - "What dependencies could conflict?"
      step_3_avoidance_strategies:
        - "Define preventive measure for each anticipated error"
        - "Create fallback plan"
        - "Set up monitoring/alerting"
        - "Prepare solution documentation"
      step_4_phase_tracking:
        - "Status per phase: PLANNED → IN_PROGRESS → REVIEW → TESTING → DONE"
