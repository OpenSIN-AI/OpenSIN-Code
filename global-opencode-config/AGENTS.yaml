# AGENTS.yaml - Machine-Native Configuration for KI Agents
# EFFECTIVE: 2026-02-21
# VERSION: 1.0 "ENTERPRISE PRACTICE FEBRUAR 2026"
# OPTIMIZED_FOR: KI Agent Parsing (NOT human reading)

meta:
  version: "1.0"
  effective_date: "2026-02-21"
  target_audience: "KI_AGENTS_ONLY"
  human_readable: false


providers:
  nvidia_nim:
    name: NVIDIA NIM Provider
    effective_date: "2026-02-16"
    mandate_version: "0.34+"
    status: ACTIVE

    # Critical Warning
    warning:
      latency_issue: "Qwen 3.5 397B has extreme latency (70-90s)"
      solution: "NO TIMEOUT ALLOWED - Timeouts are strictly forbidden"
      mandate: "NIEMALS OPENCODE TIMEOUT - Never use timeout settings in config"

    # npm Package
    npm_package: "@ai-sdk/openai-compatible"

    # OpenCode Configuration
    opencode_config:
      baseURL: "https://integrate.api.nvidia.com/v1"
      timeout: false
      models:
        qwen-3.5-397b:
          id: "qwen/qwen3.5-397b-a17b"
          context_limit: 262144
          output_limit: 32768
          use_case: "Code (BEST - aber langsam)"
          correct_id: true
        qwen2.5-coder-32b:
          context_limit: 128000
          output_limit: 8000
          use_case: "Code (fast)"
        qwen2.5-coder-7b:
          context_limit: 128000
          output_limit: 8000
          use_case: "Code (fastest)"
        kimi-k2.5:
          context_limit: 1048576
          output_limit: 65536
          use_case: "General"

    # OpenClaw Configuration
    openclaw_config:
      location: "~/.openclaw/openclaw.json"
      port: 18789
      env_variable: "NVIDIA_API_KEY"
      baseURL: "https://integrate.api.nvidia.com/v1"
      api_field: "openai-completions"
      models: []
      default_model:
        primary: "nvidia/moonshotai/kimi-k2.5"
        fallbacks:
          - "nvidia/meta/llama-3.3-70b-instruct"
          - "nvidia/mistralai/mistral-large-3-675b-instruct-2512"

    # Technical Details
    technical_details:
      endpoint: "https://integrate.api.nvidia.com/v1"
      rate_limit:
        value: 40
        unit: "RPM"
        tier: "Free"
      http_429_handling:
        solution: "60 Sekunden warten + Fallbacks nutzen"
        status_code: "429 Too Many Requests"

    # Troubleshooting
    troubleshooting:
      test_script: "/Users/jeremy/dev/sin-code/verify_nvidia.sh"
      command: "bash ~/dev/sin-code/verify_nvidia.sh"

    # Quick Commands
    quick_commands:
      test_nvidia: "openclaw models | grep nvidia"
      test_opencode: "opencode models | grep nvidia"
      gateway_restart: "openclaw gateway restart"
      gateway_doctor: "openclaw doctor --fix"
      api_test: "curl -H 'Authorization: Bearer $NVIDIA_API_KEY' https://integrate.api.nvidia.com/v1/models"

    # Config Locations
    config_locations:
      openclaw:
        path: "~/.openclaw/openclaw.json"
        provider: "nvidia-nim"
        env: "NVIDIA_API_KEY"
      opencode:
        path: "~/.config/opencode/opencode.json"
        provider: "nvidia-nim"

opencode_provider_schema:
  structure:
    provider:
      custom-name:
        npm: "@ai-sdk/openai-compatible"
        name: "Display Name"
        options:
          baseURL: "https://api.example.com/v1"
        models:
          model-id:
            name: "Model Name"
            limit:
              context: 100000
              output: 10000

fallback_chain:
  recommended_order:
    - "Primary model (fastest, smartest)"
    - "Fallback models (different strengths)"
    - "Vision models for image tasks"
    - "General models for basic tasks"

mcp_servers:
  active:
    - name: serena
      type: local
      command: "uvx serena start-mcp-server"
      purpose: Orchestration
    - name: tavily
      type: local
      command: "npx @tavily/claude-mcp"
      purpose: Web search
    - name: canva
      type: local
      command: "npx @canva/claude-mcp"
      purpose: Design
    - name: context7
      type: local
      command: "npx @anthropics/context7-mcp"
      purpose: Documentation
    - name: linear
      type: remote
      url: "https://mcp.linear.app/sse"
      purpose: Project management

