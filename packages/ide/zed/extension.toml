[agent_servers.opensin.targets.darwin-x86_64]
cmd = "opensin"
args = ["acp"]

[agent_servers.opensin.targets.linux-aarch64]
cmd = "opensin"
args = ["acp"]

[agent_servers.opensin.targets.linux-x86_64]
cmd = "opensin"
args = ["acp"]
